<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohaswin | blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Lexend+Deca:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lexend Deca', sans-serif;
            background-color: #f8f9fa;
            color: #2b2b2b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Decorative Images */
        .vine-header {
            position: absolute;
            top: -100px;
            left: 50vw;
            width: 30%;
            height: auto;
            object-fit: cover;
            object-position: top;
            z-index: 0;
            pointer-events: none;
            transform: translateX(-50%);
        }

        .speak-side {
            position: absolute;
            left: -30px;
            top: 250px;
            height: 350px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.8;
            filter: drop-shadow(4px 4px 10px rgba(0, 0, 0, 0.05));
        }

        .rocks-container {
            position: absolute;
            bottom: -20px;
            display: flex;
            align-items: flex-end;
            z-index: 0;
            pointer-events: none;
        }

        .rocks-container img {
            height: 200px;
            margin: 0 -20px;
            filter: drop-shadow(-4px 4px 10px rgba(0, 0, 0, 0.1));
        }

        /* Big Rock Interactive Styling */
        #bigrock {
            pointer-events: auto;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: transform 3s ease-in-out;
            transform-origin: bottom center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .bigrock-wrapper {
            position: relative;
            display: flex;
            align-items: flex-end;
            margin: 0 -20px;
            pointer-events: none;
        }

        .bigrock-wrapper #bigrock {
            margin: 0;
        }

        .secret-button {
            position: absolute;
            right: 40px;
            bottom: 40px;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            color: #333;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.5s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            white-space: nowrap;
        }

        .secret-button:hover {
            background: #1a1a1a;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
        }

        .secret-button.revealed {
            opacity: 1;
            pointer-events: auto;
            transition-delay: 1.2s;
        }

        @keyframes shakeRock {
            0% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(5deg);
            }

            40% {
                transform: rotate(-5deg);
            }

            60% {
                transform: rotate(3deg);
            }

            80% {
                transform: rotate(-3deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        .shake {
            animation: shakeRock 1s ease-in-out;
        }

        .roll-away {
            transform: translateX(250px) rotate(180deg) !important;
        }

        /* UI Elements */
        #back {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: transparent;
            border: 1px solid #2b2b2b;
            padding: 0.5rem 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #2b2b2b;
            cursor: pointer;
            z-index: 10;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: lowercase;
        }

        #back:hover {
            background: #2b2b2b;
            color: #f8f9fa;
        }

        /* Blog List Container */
        .content-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            padding: 4rem 2rem;
            margin-top: 180px;
            margin-bottom: 100px;
            display: flex;
            flex-direction: column;
        }

        h1.page-title {
            font-family: 'DM Serif Text', serif;
            position: absolute;
            top: 12vh;
            height: auto;
            width: 100%;
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 3rem;
            color: #1a1a1a;
            font-weight: normal;
        }

        .blog-list {
            position: relative;
            top: 67px;
            display: flex;
            flex-direction: column;
        }

        .blog-item {
            /* background: rgba(255, 255, 255, 0.7); */
            padding: 1.5rem 2rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(12px);
        }

        .blog-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: #2b2b2b;
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .blog-item:hover {
            /* transform: translateY(-4px); */
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .blog-item:hover::before {
            transform: scaleY(1);
            transform-origin: top;
        }

        .blog-preview {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            gap: 1rem;
            margin-top: 0;
            align-items: center;
        }

        .blog-item:hover .blog-preview {
            max-height: 150px;
            opacity: 1;
            margin-top: 0.8rem;
        }

        .blog-preview img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .blog-preview p {
            font-size: 0.85rem;
            color: #666;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .blog-title {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: #1a1a1a;
            transition: color 0.3s ease;
        }

        .blog-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #888;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .page-btn {
            background: transparent;
            border: 1px solid #2b2b2b;
            padding: 0.4rem 1.2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #2b2b2b;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: lowercase;
        }

        .page-btn:hover:not(:disabled) {
            background: #2b2b2b;
            color: #f8f9fa;
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #aaa;
        }

        /* Responsive */
        @media screen and (max-width: 768px) {

            h1.page-title {
                top: 6rem;
                left: unset;
            }

            .vine-header {
                position: absolute;
                top: -18px;
                left: 200px;
                height: auto;
                width: 100%;
                object-fit: cover;
                object-position: top;
                z-index: 0;
                pointer-events: none;
                max-height: 325px;
            }

            .speak-side {
                height: 200px;
                opacity: 0.2;
                /* Less intrusive on mobile */
                left: -40px;
            }

            .rocks-container img {
                height: 142px;
            }

            .content-wrapper {
                margin-top: 100px;
                padding: 1.5rem 1rem;
            }

            .blog-list {
                gap: 0.6rem;
            }

            .blog-item {
                backdrop-filter: unset;
                border: unset;
                padding: 0.8rem 1rem;
                pointer-events: none;
            }

            .blog-title {
                font-size: 0.95rem;
                pointer-events: auto;
            }

            .blog-date {
                font-size: 0.75rem;
            }

            #back {
                top: 1rem;
                left: 1rem;
                padding: 0.4rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <img src="/assets/vine.png" class="vine-header" alt="Vine Header">
    <img src="/assets/speak.avif" class="speak-side" alt="Speak Side">

    <h1 class="page-title">blog.</h1>
    <div class="rocks-container">
        <img src="/assets/landrocks.png" alt="Land Rocks">
        <div class="bigrock-wrapper">
            <button class="secret-button" id="secret-btn"
                onclick="alert('u have found a bug that will give u 33 days of good luck.')">🐞</button>
            <img src="/assets/bigrock.png" alt="Big Rock" id="bigrock">
        </div>
    </div>

    <button id="back" onclick="window.history.back()">back</button>

    <div class="content-wrapper">
        <div class="blog-list" id="blog-list">
            <!-- Blog posts will be loaded here via JavaScript -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Big rock interactions
            const bigrock = document.getElementById('bigrock');
            const secretBtn = document.getElementById('secret-btn');

            // Erratic delay before shake (between 2 to 5 seconds)
            const erraticDelay = Math.floor(Math.random() * 3000) + 2000;
            setTimeout(() => {
                if (bigrock && !bigrock.classList.contains('roll-away')) {
                    bigrock.classList.add('shake');
                    setTimeout(() => bigrock.classList.remove('shake'), 600);
                }
            }, erraticDelay);

            if (bigrock) {
                bigrock.addEventListener('click', () => {
                    bigrock.classList.add('roll-away');
                    if (secretBtn) {
                        secretBtn.classList.add('revealed');
                    }
                });
            }

            let currentPage = 1;
            const postsPerPage = 5;
            let allPosts = [];

            function renderPosts() {
                const blogList = document.getElementById('blog-list');
                blogList.innerHTML = '';

                const startIndex = (currentPage - 1) * postsPerPage;
                const endIndex = startIndex + postsPerPage;
                const postsToRender = allPosts.slice(startIndex, endIndex);

                if (postsToRender.length > 0) {
                    postsToRender.forEach(post => {
                        const dateObj = new Date(post.date);
                        const formattedDate = dateObj.toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric'
                        });

                        const a = document.createElement('a');
                        a.href = post.url;
                        a.className = 'blog-item';

                        a.innerHTML = `
                            <div class="blog-date">${formattedDate}</div>
                            <div class="blog-title">${post.title}</div>
                            <div class="blog-preview" id="preview-${post.id}"></div>
                        `;

                        blogList.appendChild(a);

                        // Fetch metadata for preview
                        fetch(post.url)
                            .then(res => res.text())
                            .then(html => {
                                const parser = new DOMParser();
                                const doc = parser.parseFromString(html, 'text/html');
                                const description = doc.querySelector('meta[name="description"]')?.content || doc.querySelector('meta[property="og:description"]')?.content || 'No description available.';
                                const image = doc.querySelector('meta[property="og:image"]')?.content || doc.querySelector('meta[name="twitter:image"]')?.content || '';

                                const previewContainer = document.getElementById(`preview-${post.id}`);
                                if (previewContainer) {
                                    if (image) {
                                        previewContainer.innerHTML += `<img src="${image}" alt="Thumbnail">`;
                                    }
                                    previewContainer.innerHTML += `<p>${description}</p>`;
                                }
                            })
                            .catch(err => {
                                const previewContainer = document.getElementById(`preview-${post.id}`);
                                if (previewContainer) {
                                    previewContainer.innerHTML = '<p>No description available.</p>';
                                }
                            });
                    });
                } else {
                    blogList.innerHTML = '<p style="text-align: center; color: #888; font-family: \'JetBrains Mono\', monospace;">No posts found.</p>';
                }

                renderPaginationControls();
            }

            function renderPaginationControls() {
                let paginationContainer = document.getElementById('pagination');
                if (!paginationContainer) {
                    paginationContainer = document.createElement('div');
                    paginationContainer.id = 'pagination';
                    paginationContainer.className = 'pagination';
                    document.querySelector('.content-wrapper').appendChild(paginationContainer);
                }

                const totalPages = Math.ceil(allPosts.length / postsPerPage);

                if (totalPages > 1) {
                    paginationContainer.innerHTML = `
                        <button class="page-btn" id="prev-btn" ${currentPage === 1 ? 'disabled' : ''}>&lt; prev</button>
                        <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #888;">${currentPage} / ${totalPages}</span>
                        <button class="page-btn" id="next-btn" ${currentPage === totalPages ? 'disabled' : ''}>next &gt;</button>
                    `;

                    const prevBtn = document.getElementById('prev-btn');
                    const nextBtn = document.getElementById('next-btn');

                    if (prevBtn) {
                        prevBtn.addEventListener('click', () => {
                            if (currentPage > 1) {
                                currentPage--;
                                renderPosts();
                                window.scrollTo({ top: 0, behavior: 'smooth' });
                            }
                        });
                    }

                    if (nextBtn) {
                        nextBtn.addEventListener('click', () => {
                            if (currentPage < totalPages) {
                                currentPage++;
                                renderPosts();
                                window.scrollTo({ top: 0, behavior: 'smooth' });
                            }
                        });
                    }
                } else {
                    paginationContainer.innerHTML = '';
                }
            }

            fetch('/blog.json')
                .then(response => response.json())
                .then(data => {
                    if (data.posts && data.posts.length > 0) {
                        allPosts = data.posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                    }
                    renderPosts();
                })
                .catch(error => {
                    console.error('Error fetching blog posts:', error);
                    document.getElementById('blog-list').innerHTML = '<p style="text-align: center; color: #888; font-family: \'JetBrains Mono\', monospace;">Failed to load posts.</p>';
                });
        });
    </script>
</body>

</html>
