<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohaswin | contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Lexend+Deca:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            height: 100dvh;
            width: 100dvw;
        }

        .header {
            position: relative;
            justify-self: center;
            margin-top: 5dvh;
            font-family: 'DM Serif Text', serif;
            font-size: 1.5rem;
        }

        body {
            display: grid;
            font-family: 'Lexend Deca', sans-serif;
            line-height: 1.6;
            padding: 1rem;
            background-color: #f4f4f4;
        }

        hr {
            width: 100%;
            border-radius: 3rem;
        }

        h1,
        h2,
        h3 {
            color: #333;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        p {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        #back {
            position: absolute;
            top: 1rem;
            left: 1rem;
            /* box-shadow: 0 2px 1px rgba(0, 0, 0, 0.1); */
            background-color: #f0f0f0;
            border: none;
            font-size: 0.8rem;
            border: 1px solid #000000;
            cursor: pointer;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        /* Wrapper that lets pinterest peek from behind infobox */
        .infobox-stack {
            position: relative;
            width: 100%;
        }

        .info {
            position: relative;
            font-family: 'Lexend Deca', sans-serif;
            background-color: #fff;
            border: 2px solid #111;
            border-radius: 0;
            padding: 0;
            box-shadow: 4px 4px 0 #111;
            z-index: 2;
            transition: box-shadow 0.15s ease, transform 0.15s ease;
            overflow: hidden;
        }

        .info ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .info li {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #e8e8e8;
            margin: 0;
        }

        .info li:last-child {
            border-bottom: none;
        }

        .info-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            background: #111;
            padding: 2px 6px;
            border-radius: 2px;
            white-space: nowrap;
            user-select: none;
        }

        .info-value {
            font-size: 0.9rem;
            color: #111;
            font-weight: 400;
        }

        .info-value a {
            color: #111;
            text-decoration: none;
            border-bottom: 1.5px solid #111;
            padding-bottom: 1px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .info-value a:hover {
            background: #111;
            color: #fff;
        }

        .poster {
            display: flex;
            align-items: center;
        }

        .poster hr {
            height: min-content;
            width: 100%;
            border-radius: unset;
            transition: all 1s ease-in-out;
        }

        #boy {
            filter: grayscale(100%);
            border-radius: 0.5rem;
            transition: filter 0.3s ease-in-out;
        }

        #cd {
            filter: grayscale(100%);
            border-radius: 0.5rem;
            transition: filter 0.1s ease-in-out;
        }

        .sponsor {
            display: flex;
            margin: 1rem;
        }

        footer {
            position: absolute;
            bottom: 0;
            right: 0;
            margin: 0;
            width: 50%;
            font-size: x-small;
        }

        #discord {
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px;
            border-radius: 2px;
            background-color: #413b3b28;
        }

        /* Pinterest peeks from behind the infobox */
        #pinterest {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(0px);
            white-space: nowrap;
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            background: #fff;
            border-radius: 0.5rem 0.5rem 0 0;
            box-shadow: 0 -3px 10px rgba(0, 0, 0, 0.1);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
        }

        #pinterest.pinterest-open {
            transform: translateX(-50%) translateY(-100%);
            opacity: 1;
            pointer-events: auto;
        }


        /* Desktop Media Query */
        @media screen and (min-width: 768px) {
            body {
                max-width: 800px;
                margin: 0 auto;
                padding: 3rem 2rem;
                min-height: 100vh;
                display: grid;
                grid-template-rows: auto auto auto 1fr auto auto auto;
                gap: 3rem;
                align-items: center;
                justify-items: center;
            }

            .header {
                font-size: 3rem;
                margin-top: 0;
            }

            .poster {
                width: 100%;
                max-width: 500px;
                gap: 2rem;
                justify-content: center;
            }

            .poster hr {
                flex: 1;
                height: 3px;
                border: none;
                background: linear-gradient(90deg, transparent, #3b3434, transparent);
            }

            #boy,
            #cd {
                height: 120px;
                width: auto;
                cursor: pointer;
                transition: all 0.3s ease;
                border-radius: 0.8rem;
            }

            #boy:hover,
            #cd:hover {
                transform: scale(1.05);
            }

            #pinterest {
                font-size: 0.95rem;
            }

            .infobox-stack {
                max-width: 500px;
            }

            .info {
                width: 100%;
                margin: 0;
            }

            .info:hover {
                box-shadow: 6px 6px 0 #111;
                transform: translate(-2px, -2px);
            }

            .info li {
                padding: 0.85rem 1.5rem;
            }

            .info-label {
                font-size: 0.7rem;
            }

            .info-value {
                font-size: 0.95rem;
            }

            #spotify {
                font-size: 1.2rem;
                padding: 0.8rem 1.5rem;
                background: #1db954;
                color: white;
                border-radius: 0.5rem;
                text-decoration: none;
                transition: all 0.3s ease;
                margin-right: 2rem;
            }

            #spotify:hover {
                background: #1ed760;
                transform: scale(1.05);
            }

            footer {
                position: absolute;
                width: 100%;
                bottom: 0;
                text-align: center;
                font-size: 1rem;
                margin: 2rem 0 0 0;
                color: #666;
            }

            footer pre {
                font-family: 'Lexend Deca', sans-serif;
                font-style: italic;
                font-size: 0.9rem;
            }

            /* #back {
                position: fixed;
                top: 2rem;
                left: 2rem;
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
                background: rgba(255, 255, 255, 0.9);
                border-radius: 0.5rem;
                cursor: pointer;
            } */

            #back {
                font-size: 1rem;
                padding: 0.5rem 1rem;
                top: 2rem;
                left: 2rem;
                transition: all 0.3s ease;
                text-decoration: none;
                color: #333;
                font-weight: 500;
            }

            #back:hover {
                background: #333;
                color: white;
                transform: translateY(-2px);
            }

            /* Better responsive spacing */
            br {
                display: none;
            }

            /* Improve link styling */
            a {
                color: #007bff;
                font-weight: 500;
                transition: color 0.2s ease;
            }

            a:hover {
                color: #0056b3;
            }
        }
    </style>
    <script>
        function flip(obj) {
            const object = document.getElementById(obj);
            const spotify = document.getElementById('spotify');
            object.style.filter = object.style.filter === 'grayscale(100%)' ? 'grayscale(0%)' : 'grayscale(100%)';
            switch (obj) {
                case 'boy':
                    togglePinterest();
                    break;
                case 'cd':
                    spotify.style.display = spotify.style.display === 'none' ? 'inline' : 'none';
                    break;
            }
        }

        function togglePinterest() {
            const pinterest = document.getElementById('pinterest');
            const infobox = document.getElementById('infobox');
            const isOpen = pinterest.classList.toggle('pinterest-open');
            // Shift infobox up slightly when pinterest peeks out
            infobox.style.transform = isOpen ? 'translateY(-6px)' : '';
        }

        function copytoclipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const discord = document.getElementById('discord');
                const originalText = discord.innerHTML;
                discord.innerHTML = 'Copied! ✔️';
                setTimeout(() => {
                    discord.innerHTML = originalText;
                }, 2000);
            });
        }
    </script>
</head>

<body>
    <button id="back" onclick="window.history.back()">back</button>
    <div class="header">contact</div>
    <section class="poster">
        <hr> <img id="boy" src="/assets/boy.avif" height="100" onclick="flip('boy')">
    </section>
    <script>document.getElementById('boy').style.filter = 'grayscale(100%)'</script>
    <!-- Stack wrapper: infobox on top, pinterest tucked behind it -->
    <div class="infobox-stack">
        <code
            id="pinterest">| <a href="https://pinterest.com/ohaswin" target="_blank">pinterest</a> | <a href="https://www.instagram.com/ohaswin/" target="_blank">instagram</a> |</code>
        <div class="info" id="infobox" onclick="flip('boy')">
            <ol>
                <li>
                    <span class="info-label">mail</span>
                    <span class="info-value"><a href="mailto:aswin@ohaswin.com">aswin@ohaswin.com</a></span>
                </li>
                <li>
                    <span class="info-label">gh</span>
                    <span class="info-value"><a href="https://github.com/ohaswin" target="_blank">ohaswin</a></span>
                </li>
                <li>
                    <span class="info-label">li</span>
                    <span class="info-value"><a href="https://www.linkedin.com/in/ohaswin/" target="_blank">ohaswin</a></span>
                </li>
                <li>
                    <span class="info-label">dc</span>
                    <span class="info-value"><code id="discord" onclick="copytoclipboard('aswinturing')">aswinturing 📋</code></span>
                </li>
                <li>
                    <span class="info-label">tw</span>
                    <span class="info-value"><a href="https://x.com/ohaswin" target="_blank">ohaswin</a></span>
                </li>
            </ol>
        </div>
    </div>
    <br>
    <section class="poster">
        <a href="https://www.last.fm/user/goldenharmony" id="spotify" target="_blank"
            style="display: none; margin-right: 12px;transition: all 1s ease-in-out;">last.fm<br></a><img id="cd"
            src="/assets/cd.avif" height="100" onclick="flip('cd')">
        <hr>
    </section>
    <script>document.getElementById('cd').style.marginLeft = '0px';</script>
    <script>document.getElementById('cd').style.filter = 'grayscale(100%)'</script>
    <div>
    </div>
    </div>
    <footer>
        <pre>tap the images for sumn extra.</pre>
    </footer>
</body>

</html>
